spring.application.name=ms-administracion-archivos
server.port=8080
# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
# ============================================================
# AWS S3
# ============================================================
aws.s3.bucket=despachog15
aws.region=us-east-1
# ============================================================
# EFS (almacenamiento temporal)
# ============================================================
efs.path=/app/efs
# ============================================================
# Azure AD B2C - OAuth2 Resource Server
#
# Reemplaza estas variables de entorno (o sus valores por defecto)
# con los datos reales de tu tenant Azure AD B2C:
#
#   AZURE_TENANT_NAME  -> nombre del tenant (ej: miempresa)
#   AZURE_USER_FLOW    -> nombre del user flow (ej: B2C_1_signupsignin)
#   AZURE_CLIENT_ID    -> Application (client) ID de la app registrada
# ============================================================
azure.tenant-name=${AZURE_TENANT_NAME:demoCloudNative}
azure.user-flow=${AZURE_USER_FLOW:B2C_1_acceso}
azure.client-id=${AZURE_CLIENT_ID:74519e45-234a-4bd0-808a-4227bd8e9252}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://democloudnative.b2clogin.com/bffd2098-bc19-42ec-9208-0941f3424faf/v2.0/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://democloudnative.b2clogin.com/democloudnative.onmicrosoft.com/B2C_1_acceso/discovery/v2.0/keys
# ============================================================
# Multipart
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# ============================================================
# Logging
# ============================================================
logging.level.software.amazon.awssdk=WARN
logging.level.sistemadegestion.demo=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
