spring.application.name=ms-guias-consumidor
server.port=8081
# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
# ============================================================
# Oracle Autonomous DB - guiasdespachodb
# ============================================================
spring.datasource.url=${ORACLE_DB_URL:jdbc:oracle:thin:@guiasdespachodb_high?TNS_ADMIN=C:/Wallet/Wallet_guiasdespachodb}
spring.datasource.username=${ORACLE_DB_USER:ADMIN}
spring.datasource.password=${ORACLE_DB_PASS:tu_password_aqui}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
# ============================================================
# Azure AD B2C - OAuth2 Resource Server
# Mismo tenant/policy/app registration que ms-guias-productor: un solo
# App Registration protege ambos microservicios (y el API Gateway).
# ============================================================
azure.tenant-name=${AZURE_TENANT_NAME:demoCloudNative}
azure.user-flow=${AZURE_USER_FLOW:B2C_1_acceso}
azure.client-id=${AZURE_CLIENT_ID:74519e45-234a-4bd0-808a-4227bd8e9252}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://democloudnative.b2clogin.com/bffd2098-bc19-42ec-9208-0941f3424faf/v2.0/
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://democloudnative.b2clogin.com/democloudnative.onmicrosoft.com/B2C_1_acceso/discovery/v2.0/keys
# ============================================================
# Logging
# ============================================================
logging.level.sistemadegestion.demo=INFO
logging.level.org.springframework.security=DEBUG
